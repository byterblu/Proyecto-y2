<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <title>YouToTwitch</title>
</head>
<body>
    <header class="header-prin">
        <nav class="navbar">
            <div class="barra-icono">
            <div class="icono-y2">
                <img src="./images/youtube_logo_icon_prueba.png" alt="Pagina Principal de y2">
            </div>
        </div>
            <div class="buscador-pagina-prin">
                <input type="text" class="bucar" placeholder=" Buscar">
                <div class="icono-busqueda">
                    <span class="material-symbols-outlined">
                        search
                        </span>
                </div>
                <div class="busqueda-microfono">
                <span class="material-symbols-outlined microfono">
                    mic
                    </span>
                </div>
            </div>
            <ul class="lista-barra-usuarios">
                <li class="texto-lista">
                    <span class="material-symbols-outlined">
                        video_call
                        </span>
                </li>
                <li class="texto-lista">
                    <span class="material-symbols-outlined">
                        apps
                        </span>
                </li>
                <li class="texto-lista">
                    <span class="material-symbols-outlined">
                        notifications
                        </span>
                </li>
                <li class="texto-lista">
                    <img src="./images/icono-usuario.jpg" alt="icono-usuario">
                </li>
            </ul>
        </nav>
    </header>

    <main class="principal">
        
    </main>

</body>
</html>
